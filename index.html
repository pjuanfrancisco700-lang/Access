<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Control de Invitados</title>

  <!-- PWA / Instalable como app -->
  <meta name="theme-color" content="#007aff" />
  <meta name="background-color" content="#f5f7fb" />
  <meta name="description" content="Panel profesional para control de invitados y confirmaciones." />

  <!-- iPhone / iPad: abrir desde pantalla de inicio sin barra de Safari -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Invitados" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />

  <!-- Manifest e iconos -->
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="./icons/icon-512.png" />

  <style>
    :root {
      --primary: #007aff;
      --primary-dark: #005ecb;
      --bg: #f5f7fb;
      --white: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: rgba(17, 24, 39, .08);
      --green: #1f9d55;
      --red: #d92d20;
      --yellow: #b7791f;
      --surface: rgba(255, 255, 255, .88);
      --soft-blue: rgba(0, 122, 255, .10);
      --shadow-card: 0 10px 30px rgba(15, 23, 42, .07);
      --shadow-soft: 0 6px 18px rgba(15, 23, 42, .06);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      overflow-y: auto;
      overscroll-behavior-x: none;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      touch-action: pan-y;
    }

    body {
      width: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(0, 122, 255, .14), transparent 32%),
        linear-gradient(180deg, #ffffff 0%, var(--bg) 46%, #eef3f9 100%);
      color: var(--text);
      overflow-x: hidden;
      overflow-y: auto;
      overscroll-behavior-x: none;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
      touch-action: pan-y;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: linear-gradient(rgba(255,255,255,.22) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.18) 1px, transparent 1px);
      background-size: 34px 34px;
      opacity: .35;
      z-index: -1;
    }

    .initial-loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(circle at top left, rgba(0, 122, 255, .08), transparent 34%),
        rgba(245, 247, 251, .72);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      opacity: 1;
      visibility: visible;
      transition: opacity .22s ease, visibility .22s ease;
    }

    .initial-loader.hide {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loading-card {
      width: min(220px, 86vw);
      min-height: 132px;
      border-radius: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: rgba(255, 255, 255, .82);
      border: 1px solid rgba(255, 255, 255, .72);
      box-shadow: 0 12px 34px rgba(15, 23, 42, .09);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .loading-spinner {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 2.5px solid rgba(0, 122, 255, .16);
      border-top-color: var(--primary);
      animation: loadingSpin .72s linear infinite;
    }

    .loading-text {
      color: var(--text);
      font-size: 15px;
      font-weight: 800;
      letter-spacing: -.18px;
    }

    @keyframes loadingSpin {
      to { transform: rotate(360deg); }
    }

    .app {
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      min-height: 100dvh;
      margin: 0 auto;
      background: rgba(255, 255, 255, .66);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: visible;
      box-shadow: 0 0 45px rgba(15, 23, 42, .06);
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(255, 255, 255, .82);
      color: var(--text);
      padding: calc(16px + env(safe-area-inset-top, 0px)) 18px 16px;
      border-bottom: 1px solid rgba(17, 24, 39, .06);
      border-bottom-left-radius: 26px;
      border-bottom-right-radius: 26px;
      box-shadow: 0 10px 28px rgba(15, 23, 42, .08);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    header h1 {
      margin: 0;
      font-size: 23px;
      line-height: 1.12;
      letter-spacing: -.45px;
      font-weight: 800;
    }

    header p {
      margin: 5px 0 0;
      font-size: 13px;
      color: var(--muted);
      font-weight: 500;
    }

    main {
      flex: 1 1 auto;
      min-height: 0;
      width: 100%;
      padding: 16px;
      padding-bottom: calc(112px + var(--safe-bottom));
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-y;
      overscroll-behavior-y: contain;
      scroll-behavior: smooth;
    }

    .screen {
      display: none;
      width: 100%;
      animation: screenFade .22s ease-out;
    }

    .screen.active {
      display: block;
      height: auto;
      min-height: 0;
      overflow: visible;
    }

    @keyframes screenFade {
      from { opacity: .75; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: var(--shadow-card);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .title {
      font-weight: 800;
      font-size: 15.5px;
      letter-spacing: -.12px;
    }

    .sub {
      color: var(--muted);
      font-size: 13px;
      margin-top: 4px;
      line-height: 1.45;
      word-break: break-word;
      font-weight: 500;
    }

    .badge {
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
      border: 1px solid rgba(255,255,255,.68);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.75), 0 4px 12px rgba(15, 23, 42, .05);
    }

    .badge.confirmado {
      background: rgba(31, 157, 85, .12);
      color: var(--green);
    }

    .badge.pendiente {
      background: rgba(245, 158, 11, .15);
      color: var(--yellow);
    }

    .badge.no {
      background: rgba(217, 45, 32, .12);
      color: var(--red);
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 14px 15px;
      font-size: 16px;
      line-height: 1.25;
      outline: none;
      background: rgba(255, 255, 255, .92);
      color: var(--text);
      margin-bottom: 11px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.9), 0 5px 16px rgba(15, 23, 42, .035);
      appearance: none;
      -webkit-appearance: none;
      transition: border-color .18s ease, box-shadow .18s ease, background .18s ease;
    }

    input::placeholder,
    textarea::placeholder {
      color: #9ca3af;
      font-weight: 500;
    }

    input:focus, select:focus, textarea:focus {
      border-color: rgba(0, 122, 255, .48);
      background: #ffffff;
      box-shadow: 0 0 0 4px rgba(0, 122, 255, .10), 0 8px 20px rgba(15, 23, 42, .05);
    }

    textarea {
      min-height: 88px;
      resize: none;
    }

    button {
      border: none;
      border-radius: var(--radius-lg);
      padding: 13px 15px;
      font-size: 14px;
      line-height: 1.1;
      font-weight: 800;
      cursor: pointer;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
      transform: translateY(0) scale(1);
      will-change: transform;
      transition: transform .14s ease, box-shadow .14s ease, opacity .16s ease, background .16s ease, filter .14s ease;
    }

    button:not(:disabled):active,
    button.is-pressing:not(:disabled) {
      transform: translateY(3px) scale(.955);
      filter: saturate(.94) brightness(.98);
      box-shadow: inset 0 3px 8px rgba(15, 23, 42, .10), 0 2px 8px rgba(15, 23, 42, .06) !important;
    }

    button:disabled {
      opacity: .65;
      cursor: not-allowed;
      transform: none;
      filter: none;
    }

    button.btn-procesando {
      opacity: .78;
      transform: translateY(2px) scale(.972);
      box-shadow: inset 0 3px 8px rgba(15, 23, 42, .08), 0 2px 8px rgba(15, 23, 42, .05) !important;
    }

    .btn {
      background: linear-gradient(180deg, #1a8cff 0%, var(--primary) 100%);
      color: white;
      width: 100%;
      box-shadow: 0 10px 22px rgba(0, 122, 255, .24);
    }

    .btn-light {
      background: var(--soft-blue);
      color: var(--primary-dark);
      width: 100%;
      box-shadow: var(--shadow-soft);
    }

    .btn-green {
      background: rgba(31, 157, 85, .13);
      color: var(--green);
      width: 100%;
      box-shadow: var(--shadow-soft);
    }

    .btn-red {
      background: rgba(217, 45, 32, .12);
      color: var(--red);
      width: 100%;
      box-shadow: var(--shadow-soft);
    }

    .btn:not(:disabled):active {
      box-shadow: 0 5px 14px rgba(0, 122, 255, .18);
    }

    .btn-light:not(:disabled):active,
    .btn-green:not(:disabled):active,
    .btn-red:not(:disabled):active,
    nav button:not(:disabled):active {
      box-shadow: 0 3px 10px rgba(15, 23, 42, .06);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .stat {
      background: rgba(255, 255, 255, .86);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 16px 10px;
      text-align: center;
      box-shadow: var(--shadow-card);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .stat strong {
      display: block;
      font-size: 27px;
      line-height: 1;
      color: var(--primary-dark);
      letter-spacing: -.5px;
    }

    .stat span {
      display: block;
      margin-top: 7px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
    }

    .panel-refresh-wrap {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 12px;
    }

    .panel-refresh-btn {
      width: auto;
      min-width: 148px;
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 13px;
      box-shadow: var(--shadow-soft);
    }

    nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      max-width: 480px;
      width: 100%;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
      padding: 8px 10px calc(10px + var(--safe-bottom));
      z-index: 50;
      background: rgba(255, 255, 255, .86);
      border-top: 1px solid rgba(17, 24, 39, .08);
      box-shadow: 0 -12px 28px rgba(15, 23, 42, .10);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      transform-style: preserve-3d;
      will-change: transform;
    }

    nav button {
      background: transparent;
      color: var(--muted);
      font-size: 11px;
      padding: 7px 4px 6px;
      border-radius: 17px;
      min-height: 56px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
    }

    nav button.active {
      color: var(--primary-dark);
      font-weight: 900;
      background: rgba(0, 122, 255, .10);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.86), 0 6px 16px rgba(0, 122, 255, .10);
    }

    nav .icon {
      display: grid;
      place-items: center;
      width: 28px;
      height: 28px;
      margin-bottom: 0;
      border-radius: 10px;
      font-size: 18px;
      line-height: 1;
      filter: saturate(.92);
    }

    nav button.active .icon {
      background: rgba(255, 255, 255, .72);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.9), 0 4px 10px rgba(0, 122, 255, .10);
    }


    .guest-card {
      position: relative;
    }

    .guest-card .row {
      align-items: flex-start;
      padding-right: 38px;
    }

    .edit-guest-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 34px;
      height: 34px;
      min-width: 34px;
      padding: 0;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, .78);
      color: var(--primary-dark);
      font-size: 14px;
      box-shadow: 0 6px 16px rgba(15, 23, 42, .08);
      border: 1px solid rgba(17, 24, 39, .07);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .edit-guest-btn:not(:disabled):active {
      box-shadow: 0 3px 10px rgba(15, 23, 42, .06);
    }

    .edit-modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 120;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 16px;
      padding-bottom: calc(18px + var(--safe-bottom));
      background: rgba(15, 23, 42, .28);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .edit-modal-overlay.hidden {
      display: none;
    }

    .edit-modal-card {
      width: min(448px, 100%);
      background: rgba(255, 255, 255, .92);
      border: 1px solid rgba(255, 255, 255, .72);
      border-radius: 28px;
      padding: 16px;
      box-shadow: 0 18px 48px rgba(15, 23, 42, .18);
      animation: modalUp .18s ease-out;
    }

    @keyframes modalUp {
      from { opacity: .82; transform: translateY(12px) scale(.985); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .edit-modal-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
    }

    .edit-modal-close {
      width: 34px;
      height: 34px;
      min-width: 34px;
      padding: 0;
      border-radius: 50%;
      background: rgba(17, 24, 39, .06);
      color: var(--muted);
      box-shadow: var(--shadow-soft);
      font-size: 18px;
      line-height: 1;
    }

    .edit-modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 2px;
    }

    .edit-modal-delete {
      margin-top: 10px;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 34px 12px;
      font-size: 14px;
      font-weight: 600;
    }

    .message-item {
      padding: 12px 0;
      border-bottom: 1px solid rgba(17, 24, 39, .07);
    }

    .message-item:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .message-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 6px;
    }

    .message-text {
      color: var(--text);
      font-size: 14px;
      line-height: 1.45;
      margin-top: 8px;
      word-break: break-word;
      font-weight: 500;
    }


    .toast-aviso {
      position: fixed;
      left: 50%;
      bottom: calc(92px + var(--safe-bottom));
      z-index: 140;
      width: min(420px, calc(100% - 28px));
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(17, 24, 39, .88);
      color: #ffffff;
      font-size: 13px;
      line-height: 1.35;
      font-weight: 700;
      text-align: center;
      box-shadow: 0 14px 34px rgba(15, 23, 42, .18);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      opacity: 0;
      pointer-events: none;
      transform: translateX(-50%) translateY(12px) scale(.98);
      transition: opacity .18s ease, transform .18s ease;
    }

    .toast-aviso.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0) scale(1);
    }

    .hidden {
      display: none;
    }

    @media (max-width: 380px) {
      header h1 { font-size: 21px; }
      main { padding: 14px; padding-bottom: calc(108px + var(--safe-bottom)); }
      .card { padding: 14px; border-radius: 22px; }
      .grid { gap: 10px; }
      .stat strong { font-size: 24px; }
      nav { padding-left: 8px; padding-right: 8px; }
      nav button { font-size: 10.5px; }
    }
  </style>
</head>

<body>
  <div id="appLoading" class="initial-loader" aria-live="polite" aria-label="Cargando datos">
    <div class="loading-card">
      <div class="loading-spinner" aria-hidden="true"></div>
      <div class="loading-text">Cargando datos…</div>
    </div>
  </div>

  <div class="app">
    <header>
      <h1 id="appTitle">Control de Invitados</h1>
      <p id="appSubtitle">Panel del organizador</p>
    </header>

    <main>
      <section id="screenInvitados" class="screen active">
        <input id="buscarInvitado" type="search" placeholder="Buscar invitado..." oninput="renderInvitados()" />

        <div class="card">
          <div class="title">Agregar invitado</div>
          <br>
          <input id="nuevoNombre" placeholder="Nombre invitado" />
          <input id="nuevoTelefono" placeholder="Teléfono" inputmode="numeric" />
          <input id="nuevoPersonas" placeholder="Personas invitadas" type="number" min="1" value="1" />
          <button class="btn" onclick="agregarInvitado()">Agregar</button>
        </div>

        <div id="listaInvitados"></div>
      </section>

      <section id="screenLinks" class="screen">
        <div id="listaLinks"></div>
      </section>

      <section id="screenPanel" class="screen">
        <div class="panel-refresh-wrap">
          <button id="btnActualizarPanel" class="btn-light panel-refresh-btn" type="button" onclick="actualizarPanel(this, false)">
            Actualizar panel
          </button>
        </div>

        <div class="grid">
          <div class="stat"><strong id="statInvitados">0</strong><span>Invitados</span></div>
          <div class="stat"><strong id="statPersonas">0</strong><span>Personas invitadas</span></div>
          <div class="stat"><strong id="statConfirmados">0</strong><span>Confirmados</span></div>
          <div class="stat"><strong id="statPendientes">0</strong><span>Pendientes</span></div>
          <div class="stat"><strong id="statNo">0</strong><span>No asistirán</span></div>
          <div class="stat"><strong id="statPersonasConfirmadas">0</strong><span>Personas confirmadas</span></div>
        </div>

        <br>

        <div class="card">
          <div class="title">Sí asistirán</div>
          <div id="panelConfirmados"></div>
        </div>

        <div class="card">
          <div class="title">No asistirán</div>
          <div id="panelNoAsisten"></div>
        </div>

        <div class="card">
          <div class="title">Mensajes de invitados</div>
          <div id="panelComentarios"></div>
        </div>
      </section>

      <section id="screenConfig" class="screen">
        <div class="card">
          <div class="title">Configuración</div>
          <br>
          <input id="cfgNovio" placeholder="Novio" />
          <input id="cfgNovia" placeholder="Novia" />
          <input id="cfgFecha" placeholder="Fecha evento" type="date" />
          <input id="cfgHora" placeholder="Hora evento" type="time" />
          <input id="cfgLugar" placeholder="Lugar" />
          <input id="cfgMapa" placeholder="Link mapa" />
          <input id="cfgVestimenta" placeholder="Código vestimenta" />
          <input id="cfgLimite" placeholder="Fecha límite confirmación" />
          <textarea id="cfgMensajeWhatsApp" placeholder="Mensaje WhatsApp. Usa {NOMBRE} para insertar el nombre del invitado."></textarea>
          <textarea id="cfgDetalles" placeholder="Detalles especiales"></textarea>
          <button class="btn" onclick="guardarConfig()">Guardar configuración</button>
        </div>
      </section>
    </main>

    <nav>
      <button class="active" onclick="abrirPantalla('Invitados', this)">
        <span class="icon">👥</span>Invitados
      </button>
      <button onclick="abrirPantalla('Links', this)">
        <span class="icon">🔗</span>Links
      </button>
      <button onclick="abrirPantalla('Panel', this)">
        <span class="icon">📊</span>Panel
      </button>
      <button onclick="abrirPantalla('Config', this)">
        <span class="icon">⚙️</span>Config
      </button>
    </nav>
  </div>

  <div id="modalEditarInvitado" class="edit-modal-overlay hidden" aria-hidden="true">
    <div class="edit-modal-card" role="dialog" aria-modal="true" aria-labelledby="modalEditarInvitadoTitulo">
      <div class="edit-modal-head">
        <div>
          <div id="modalEditarInvitadoTitulo" class="title">Editar invitado</div>
          <div class="sub">Actualiza solo los datos de creación.</div>
        </div>
        <button class="edit-modal-close" type="button" onclick="cerrarEditorInvitado()" aria-label="Cerrar">×</button>
      </div>

      <input id="editInvitadoNombre" placeholder="Nombre invitado" />
      <input id="editInvitadoTelefono" placeholder="Teléfono" inputmode="numeric" />
      <input id="editInvitadoPersonas" placeholder="Personas invitadas" type="number" min="1" />

      <div class="edit-modal-actions">
        <button class="btn-light" type="button" onclick="cerrarEditorInvitado()">Cancelar</button>
        <button class="btn" type="button" onclick="guardarEdicionInvitado()">Guardar</button>
      </div>

      <button class="btn-red edit-modal-delete" type="button" onclick="eliminarInvitadoEditando()">Eliminar invitado</button>
    </div>
  </div>

  <div id="toastAviso" class="toast-aviso hidden" role="status" aria-live="polite"></div>


  <script>

    /************************************************
     * PWA: registrar service worker
     * Esto permite que Android/iPhone lo reconozcan mejor como app instalable.
     ************************************************/
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(err => {
          console.log("Service Worker no registrado:", err);
        });
      });
    }

    /************************************************
     * CONEXIÓN CON APPS SCRIPT
     ************************************************/
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz69fn1EObAN6vZclYWriHvBfQDJACm6XbZ5H2v6tdE8IWDz2rIH0VawxayE41v-KQe/exec";

    /************************************************
     * URL pública de la invitación en GitHub Pages.
     * IMPORTANTE: cambia esta URL por la URL real de tu invitación.
     * Debe terminar con ?id=
     ************************************************/
    const URL_INVITACION = "https://eventgt.online/?id=";

    let invitados = [];
    let configuracion = {};
    let invitadoEditando = null;
    let loadingInicialOculto = false;
    let panelActualizando = false;
    const accionesLinksBloqueadas = new Set();

    document.addEventListener("DOMContentLoaded", cargarApp);

    document.addEventListener("pointerdown", activarEfectoBoton, true);
    document.addEventListener("pointerup", quitarEfectoBoton, true);
    document.addEventListener("pointercancel", quitarEfectoBoton, true);
    document.addEventListener("pointerleave", quitarEfectoBoton, true);

    function activarEfectoBoton(e) {
      const btn = e.target.closest("button");
      if (!btn || btn.disabled) return;
      btn.classList.add("is-pressing");
    }

    function quitarEfectoBoton(e) {
      const btn = e.target.closest("button");
      if (!btn) return;
      setTimeout(() => btn.classList.remove("is-pressing"), 120);
    }

    function mostrarLoadingInicial() {
      const loader = document.getElementById("appLoading");
      if (!loader) return;

      loader.style.display = "flex";
      loader.classList.remove("hide");
    }

    function ocultarLoadingInicial() {
      const loader = document.getElementById("appLoading");
      if (!loader || loadingInicialOculto) return;

      loadingInicialOculto = true;

      requestAnimationFrame(() => {
        loader.classList.add("hide");
      });

      setTimeout(() => {
        if (loader.classList.contains("hide")) {
          loader.style.display = "none";
        }
      }, 260);
    }

    function construirUrlApi(action, params = {}) {
      const url = new URL(APPS_SCRIPT_URL);
      url.searchParams.set("action", action);

      Object.keys(params).forEach(key => {
        url.searchParams.set(key, params[key]);
      });

      return url;
    }

    async function api(action, params = {}) {
      const url = construirUrlApi(action, params);
      const res = await fetch(url.toString());
      return await res.json();
    }

    async function cargarApp() {
      mostrarLoadingInicial();

      try {
        await cargarInvitados();

        renderInvitados();
        renderLinks();
        renderPanel();

        ocultarLoadingInicial();

        await cargarConfiguracion();
      } catch (e) {
        console.error("Error al cargar la app:", e);
        renderInvitados();
        renderLinks();
        renderPanel();
        ocultarLoadingInicial();
      }
    }

    function abrirPantalla(nombre, btn) {
      document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
      document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));

      document.getElementById("screen" + nombre).classList.add("active");
      btn.classList.add("active");

      const titulos = {
        Invitados: "Invitados",
        Links: "Links WhatsApp",
        Panel: "Panel",
        Config: "Configuración"
      };

      document.getElementById("appTitle").textContent = titulos[nombre];

      if (nombre === "Links") renderLinks();
      if (nombre === "Panel") {
        renderPanel();
        actualizarPanel(null, true);
      }

      const main = document.querySelector("main");
      if (main) main.scrollTop = 0;
      window.scrollTo(0, 0);
    }

    async function cargarInvitados(silencioso = false) {
      try {
        const data = await api("listarInvitados");

        if (data.ok) {
          invitados = data.invitados || [];
        } else {
          if (!silencioso) {
            invitados = [];
            alert(data.mensaje || "No se pudieron cargar los invitados.");
          }

          throw new Error(data.mensaje || "No se pudieron cargar los invitados.");
        }
      } catch (e) {
        console.error(e);

        if (!silencioso) {
          invitados = [];
          alert("No se pudo conectar con Apps Script.");
          return;
        }

        throw e;
      }
    }

    async function cargarConfiguracion() {
      try {
        const data = await api("obtenerConfiguracionAdmin");

        if (data.ok) {
          configuracion = data.configuracion || {};
          pintarConfig();
        }
      } catch (e) {
        console.error(e);
      }
    }

    function renderInvitados() {
      const cont = document.getElementById("listaInvitados");
      const q = document.getElementById("buscarInvitado").value.toLowerCase().trim();

      const filtrados = invitados.filter(i =>
        String(i.nombre || "").toLowerCase().includes(q)
      );

      if (!filtrados.length) {
        cont.innerHTML = `<div class="empty">No hay invitados.</div>`;
        return;
      }

      cont.innerHTML = filtrados.map(i => `
        <div class="card guest-card">
          <button class="edit-guest-btn" type="button" onclick="abrirEditorInvitadoPorFila(${Number(i.fila || 0)})" aria-label="Editar invitado">
            ✏️
          </button>
          <div class="row">
            <div>
              <div class="title">${esc(i.nombre)}</div>
              <div class="sub">${esc(i.telefono || "Sin teléfono")}</div>
              <div class="sub">${Number(i.personasInvitadas || 1)} personas invitadas</div>
            </div>
            <span class="badge ${claseEstado(i.estado)}">${esc(i.estado || "Pendiente")}</span>
          </div>
        </div>
      `).join("");
    }

    function renderLinks() {
      const cont = document.getElementById("listaLinks");

      if (!invitados.length) {
        cont.innerHTML = `<div class="empty">No hay links disponibles.</div>`;
        return;
      }

      cont.innerHTML = invitados.map((i, index) => {
        const link = URL_INVITACION + encodeURIComponent(i.id || "");
        const enviado = i.envioWhatsApp || i.envio || "Pendiente de envío";

        return `
          <div class="card" data-link-index="${index}">
            <div class="row">
              <div>
                <div class="title">${esc(i.nombre)}</div>
                <div class="sub">${esc(i.telefono || "Sin teléfono")}</div>
                <div class="sub link-send-status">${esc(enviado)}</div>
              </div>
            </div>
            <br>
            <button class="btn-green" onclick="compartirWhatsApp(${index}, this)">
              Compartir WhatsApp
            </button>
            <br><br>
            <button class="btn-light" onclick="copiarLink(${index}, this)">
              Copiar link
            </button>
          </div>
        `;
      }).join("");
    }

    function renderPanel() {
      const totalInvitados = invitados.length;
      const totalPersonas = invitados.reduce((a, i) => a + Number(i.personasInvitadas || 0), 0);
      const confirmados = invitados.filter(i => i.estado === "Confirmado");
      const pendientes = invitados.filter(i => !i.estado || i.estado === "Pendiente");
      const noAsisten = invitados.filter(i => i.estado === "No asistirá");
      const personasConfirmadas = invitados.reduce((a, i) => a + Number(i.personasConfirmadas || 0), 0);
      const comentarios = invitados.filter(i => String(i.comentario || "").trim());

      document.getElementById("statInvitados").textContent = totalInvitados;
      document.getElementById("statPersonas").textContent = totalPersonas;
      document.getElementById("statConfirmados").textContent = confirmados.length;
      document.getElementById("statPendientes").textContent = pendientes.length;
      document.getElementById("statNo").textContent = noAsisten.length;
      document.getElementById("statPersonasConfirmadas").textContent = personasConfirmadas;

      document.getElementById("panelConfirmados").innerHTML =
        confirmados.length
          ? confirmados.map(i => `<div class="sub">${esc(i.nombre)} — ${Number(i.personasConfirmadas || 0)} personas</div>`).join("")
          : `<div class="sub">Sin confirmados.</div>`;

      document.getElementById("panelNoAsisten").innerHTML =
        noAsisten.length
          ? noAsisten.map(i => `<div class="sub">${esc(i.nombre)}</div>`).join("")
          : `<div class="sub">Sin registros.</div>`;

      document.getElementById("panelComentarios").innerHTML =
        comentarios.length
          ? comentarios.map(i => `
            <div class="message-item">
              <div class="message-head">
                <div>
                  <div class="title">${esc(i.nombre)}</div>
                  <div class="sub">${esc(i.fechaConfirmacion || i.fecha || "Sin fecha de confirmación")}</div>
                </div>
                <span class="badge ${claseEstado(i.estado)}">${esc(i.estado || "Pendiente")}</span>
              </div>
              <div class="message-text">${esc(i.comentario)}</div>
            </div>
          `).join("")
          : `<div class="sub">Aún no hay mensajes de invitados.</div>`;
    }

    async function actualizarPanel(btn = null, silencioso = false) {
      if (panelActualizando) return;

      const boton = btn || document.getElementById("btnActualizarPanel");
      const textoOriginal = boton ? boton.textContent.trim() : "Actualizar panel";
      const invitadosAnteriores = Array.isArray(invitados) ? [...invitados] : [];

      panelActualizando = true;

      if (boton) {
        boton.disabled = true;
        boton.classList.add("btn-procesando");
        boton.textContent = "Actualizando…";
      }

      try {
        await cargarInvitados(true);

        renderPanel();
        renderInvitados();
        renderLinks();
      } catch (e) {
        console.error("Error al actualizar panel:", e);
        invitados = invitadosAnteriores;

        if (!silencioso) {
          mostrarAvisoDiscreto("No se pudo actualizar el panel. Intenta de nuevo.");
        }
      } finally {
        panelActualizando = false;

        if (boton) {
          boton.disabled = false;
          boton.classList.remove("btn-procesando");
          boton.textContent = textoOriginal || "Actualizar panel";
        }
      }
    }

    async function agregarInvitado() {
      const nombre = document.getElementById("nuevoNombre").value.trim();
      const telefono = document.getElementById("nuevoTelefono").value.trim();
      const personas = document.getElementById("nuevoPersonas").value || 1;

      if (!nombre) {
        alert("Escribe el nombre del invitado.");
        return;
      }

      const data = await api("agregarInvitado", {
        nombre,
        telefono,
        personas
      });

      if (data.ok) {
        document.getElementById("nuevoNombre").value = "";
        document.getElementById("nuevoTelefono").value = "";
        document.getElementById("nuevoPersonas").value = 1;

        await cargarInvitados();
        renderInvitados();
        renderLinks();
        renderPanel();

        alert("Invitado agregado.");
      } else {
        alert(data.mensaje || "No se pudo agregar.");
      }
    }


    function abrirEditorInvitadoPorFila(fila) {
      const invitado = invitados.find(i => Number(i.fila || 0) === Number(fila));

      if (!invitado) {
        alert("No se encontró el invitado.");
        return;
      }

      invitadoEditando = invitado;

      document.getElementById("editInvitadoNombre").value = invitado.nombre || "";
      document.getElementById("editInvitadoTelefono").value = invitado.telefono || "";
      document.getElementById("editInvitadoPersonas").value = Number(invitado.personasInvitadas || 1);

      const modal = document.getElementById("modalEditarInvitado");
      modal.classList.remove("hidden");
      modal.setAttribute("aria-hidden", "false");
    }

    function cerrarEditorInvitado() {
      const modal = document.getElementById("modalEditarInvitado");
      modal.classList.add("hidden");
      modal.setAttribute("aria-hidden", "true");
      invitadoEditando = null;
    }

    async function guardarEdicionInvitado() {
      if (!invitadoEditando) {
        alert("No se encontró el invitado a editar.");
        return;
      }

      const nombre = document.getElementById("editInvitadoNombre").value.trim();
      const telefono = document.getElementById("editInvitadoTelefono").value.trim();
      const personas = Number(document.getElementById("editInvitadoPersonas").value || 1);

      if (!nombre) {
        alert("Escribe el nombre del invitado.");
        return;
      }

      if (!personas || personas < 1) {
        alert("La cantidad de personas debe ser mayor a 0.");
        return;
      }

      try {
        const data = await api("editarInvitado", {
          fila: invitadoEditando.fila,
          id: invitadoEditando.id,
          nombre,
          telefono,
          personas
        });

        if (data.ok) {
          cerrarEditorInvitado();

          await cargarInvitados();
          renderInvitados();
          renderLinks();
          renderPanel();

          alert(data.mensaje || "Invitado actualizado.");
        } else {
          alert(data.mensaje || "No se pudo actualizar el invitado.");
        }
      } catch (e) {
        console.error(e);
        alert("No se pudo conectar con Apps Script.");
      }
    }

    async function eliminarInvitadoEditando() {
      if (!invitadoEditando) {
        alert("No se encontró el invitado a eliminar.");
        return;
      }

      const confirmar = confirm("¿Seguro que quieres eliminar este invitado? Esta acción no se puede deshacer.");

      if (!confirmar) return;

      try {
        const data = await api("eliminarInvitado", {
          fila: invitadoEditando.fila,
          id: invitadoEditando.id
        });

        if (data.ok) {
          cerrarEditorInvitado();

          await cargarInvitados();
          renderInvitados();
          renderLinks();
          renderPanel();

          alert(data.mensaje || "Invitado eliminado.");
        } else {
          alert(data.mensaje || "No se pudo eliminar el invitado.");
        }
      } catch (e) {
        console.error(e);
        alert("No se pudo conectar con Apps Script.");
      }
    }

    function compartirWhatsApp(index, btn) {
      const invitado = invitados[index];

      if (!invitado) {
        alert("No se encontró el invitado.");
        return;
      }

      const tel = String(invitado.telefono || "").replace(/\D/g, "");

      if (!tel) {
        alert("Este invitado no tiene teléfono.");
        return;
      }

      const claveBloqueo = obtenerClaveAccionLink("whatsapp", invitado, index);

      if (!bloquearAccionLink(claveBloqueo, 1400)) return;

      const textoOriginal = btn ? btn.textContent : "";

      if (btn) {
        prepararBotonTemporal(btn, "Abriendo…");
      }

      const link = URL_INVITACION + encodeURIComponent(invitado.id || "");

      let mensajeBase = configuracion["Mensaje WhatsApp"] || "Hola {NOMBRE}, te compartimos tu invitación especial:";
      mensajeBase = mensajeBase.replaceAll("{NOMBRE}", invitado.nombre || "");

      const mensaje = `${mensajeBase}
${link}`;
      const whatsappUrl = "https://wa.me/502" + tel + "?text=" + encodeURIComponent(mensaje);

      actualizarEstadoEnvioLocal(index);

      registrarAccionLinkEnSegundoPlano(
        index,
        "registrarEnvioWhatsApp",
        {
          fila: invitado.fila,
          telefono: tel,
          mensaje: mensaje,
          formato: "json"
        },
        "WhatsApp se abrió, pero no se pudo registrar el envío en Sheets."
      );

      restaurarBotonTemporal(btn, textoOriginal || "Compartir WhatsApp", 700);
      window.location.href = whatsappUrl;
    }

    async function copiarLink(index, btn) {
      const invitado = invitados[index];

      if (!invitado) return;

      const claveBloqueo = obtenerClaveAccionLink("copiar", invitado, index);

      if (!bloquearAccionLink(claveBloqueo, 1300)) return;

      const textoOriginal = btn ? btn.textContent : "";

      if (btn) {
        prepararBotonTemporal(btn, "Copiando…");
      }

      const link = URL_INVITACION + encodeURIComponent(invitado.id || "");
      const copiado = await copiarTextoPortapapeles(link);

      if (btn) {
        btn.textContent = copiado ? "Copiado" : "Link listo";
      }

      actualizarEstadoEnvioLocal(index);

      registrarAccionLinkEnSegundoPlano(
        index,
        "registrarLinkCopiado",
        {
          fila: invitado.fila,
          id: invitado.id
        },
        "El link quedó listo, pero no se pudo registrar en Sheets."
      );

      restaurarBotonTemporal(btn, textoOriginal || "Copiar link", 750);
    }

    function obtenerClaveAccionLink(tipo, invitado, index) {
      return `${tipo}-${invitado.id || invitado.fila || index}`;
    }

    function bloquearAccionLink(clave, duracion = 1200) {
      if (accionesLinksBloqueadas.has(clave)) return false;

      accionesLinksBloqueadas.add(clave);

      setTimeout(() => {
        accionesLinksBloqueadas.delete(clave);
      }, duracion);

      return true;
    }

    function prepararBotonTemporal(btn, texto) {
      if (!btn) return;

      btn.disabled = true;
      btn.classList.add("btn-procesando");
      btn.textContent = texto;
    }

    function restaurarBotonTemporal(btn, texto, espera = 700) {
      if (!btn) return;

      setTimeout(() => {
        if (!btn.isConnected) return;

        btn.disabled = false;
        btn.classList.remove("btn-procesando");
        btn.textContent = texto;
      }, espera);
    }

    function actualizarEstadoEnvioLocal(index, fechaEnvio = "") {
      const invitado = invitados[index];

      if (!invitado) return;

      invitado.envioWhatsApp = "✅ Enviado";
      invitado.envio = "✅ Enviado";

      if (fechaEnvio) {
        invitado.fechaEnvioWhatsApp = fechaEnvio;
      }

      const card = document.querySelector(`[data-link-index="${index}"]`);
      const estado = card ? card.querySelector(".link-send-status") : null;

      if (estado) {
        estado.textContent = invitado.envioWhatsApp;
      }
    }

    function registrarAccionLinkEnSegundoPlano(index, action, params, mensajeFallo) {
      const url = construirUrlApi(action, params);

      fetch(url.toString(), {
        method: "GET",
        cache: "no-store",
        keepalive: true
      })
        .then(res => res.json())
        .then(data => {
          if (data && data.ok) {
            actualizarEstadoEnvioLocal(index, data.fechaEnvioWhatsApp || "");
            return;
          }

          mostrarAvisoDiscreto((data && data.mensaje) || mensajeFallo);
        })
        .catch(error => {
          console.log("Registro en segundo plano no completado:", error);
          mostrarAvisoDiscreto(mensajeFallo);
        });
    }

    async function copiarTextoPortapapeles(texto) {
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(texto);
          return true;
        }
      } catch (e) {
        console.log("Clipboard API no disponible:", e);
      }

      try {
        const area = document.createElement("textarea");
        area.value = texto;
        area.setAttribute("readonly", "");
        area.style.position = "fixed";
        area.style.top = "-9999px";
        area.style.opacity = "0";

        document.body.appendChild(area);
        area.focus();
        area.select();

        const copiado = document.execCommand("copy");
        document.body.removeChild(area);

        if (copiado) return true;
      } catch (e) {
        console.log("Copia alternativa no disponible:", e);
      }

      prompt("Copia el link:", texto);
      return false;
    }

    function mostrarAvisoDiscreto(mensaje) {
      const toast = document.getElementById("toastAviso");

      if (!toast || !mensaje) return;

      toast.textContent = mensaje;
      toast.classList.remove("hidden");

      requestAnimationFrame(() => {
        toast.classList.add("show");
      });

      clearTimeout(toast._timer);

      toast._timer = setTimeout(() => {
        toast.classList.remove("show");

        setTimeout(() => {
          if (!toast.classList.contains("show")) {
            toast.classList.add("hidden");
          }
        }, 220);
      }, 2800);
    }

    function pintarConfig() {
      document.getElementById("cfgNovio").value = configuracion["Novio"] || "";
      document.getElementById("cfgNovia").value = configuracion["Novia"] || "";
      document.getElementById("cfgFecha").value = configuracion["Fecha evento"] || "";
      document.getElementById("cfgHora").value = configuracion["Hora evento"] || "";
      document.getElementById("cfgLugar").value = configuracion["Lugar"] || "";
      document.getElementById("cfgMapa").value = configuracion["Link mapa"] || "";
      document.getElementById("cfgVestimenta").value = configuracion["Código vestimenta"] || "";
      document.getElementById("cfgLimite").value = configuracion["Fecha límite confirmación"] || "";
      document.getElementById("cfgMensajeWhatsApp").value = configuracion["Mensaje WhatsApp"] || "";
      document.getElementById("cfgDetalles").value = configuracion["Detalles especiales mensaje"] || "";
    }

   async function guardarConfig() {
  const data = await api("guardarConfiguracionAdmin", {
    novio: document.getElementById("cfgNovio").value,
    novia: document.getElementById("cfgNovia").value,
    fecha: document.getElementById("cfgFecha").value,
    hora: document.getElementById("cfgHora").value,
    lugar: document.getElementById("cfgLugar").value,
    mapa: document.getElementById("cfgMapa").value,
    vestimenta: document.getElementById("cfgVestimenta").value,
    limite: document.getElementById("cfgLimite").value,
    mensajeWhatsapp: document.getElementById("cfgMensajeWhatsApp").value,
    detalles: document.getElementById("cfgDetalles").value
  });

  if (data.ok) {
    await cargarConfiguracion();
  }

  alert(data.mensaje || "Configuración guardada.");
}

    function claseEstado(estado) {
      if (estado === "Confirmado") return "confirmado";
      if (estado === "No asistirá") return "no";
      return "pendiente";
    }

    function esc(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
